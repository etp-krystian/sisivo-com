<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFC" />
      <stop offset="0.55" stop-color="#F1F5F9" />
      <stop offset="1" stop-color="#E2E8F0" />
    </linearGradient>
    <radialGradient id="glow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 180) rotate(35) scale(520 360)">
      <stop stop-color="rgba(0,143,76,0.18)" />
      <stop offset="1" stop-color="rgba(0,143,76,0.00)" />
    </radialGradient>
    <radialGradient id="glow2" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 120) rotate(140) scale(520 360)">
      <stop stop-color="rgba(0,143,76,0.10)" />
      <stop offset="1" stop-color="rgba(0,143,76,0.00)" />
    </radialGradient>
    <filter id="shadow" x="-20" y="-20" width="1240" height="670" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="20" flood-color="rgba(2,6,23,0.14)" />
    </filter>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#glow)" />
  <rect width="1200" height="630" fill="url(#glow2)" />

  <g filter="url(#shadow)">
    <rect x="70" y="86" width="1060" height="458" rx="28" fill="rgba(255,255,255,0.88)" stroke="rgba(226,232,240,0.95)" />
  </g>

  <!-- Abstract, professional shapes (no text) -->
  <circle cx="320" cy="290" r="150" fill="rgba(0,143,76,0.10)" />
  <circle cx="320" cy="290" r="118" fill="none" stroke="rgba(0,143,76,0.22)" stroke-width="10" />
  <circle cx="320" cy="290" r="82" fill="none" stroke="rgba(0,143,76,0.16)" stroke-width="8" />

  <circle cx="820" cy="360" r="210" fill="rgba(0,143,76,0.08)" />
  <circle cx="880" cy="270" r="140" fill="rgba(15,23,42,0.06)" />
  <circle cx="820" cy="360" r="150" fill="none" stroke="rgba(71,85,105,0.16)" stroke-width="10" />

  <circle cx="220" cy="220" r="8" fill="#008F4C" />
  <circle cx="980" cy="460" r="7" fill="rgba(0,143,76,0.70)" />
</svg>
